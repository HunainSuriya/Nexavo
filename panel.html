<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Nexavo Portfolio Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0A1628;
            font-family: system-ui, -apple-system, sans-serif;
            color: #cad2e6;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(201,168,76,0.3);
        }
        h1 {
            color: #C9A84C;
            font-family: 'Playfair Display', serif;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid #C9A84C;
            color: #C9A84C;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
        .form-card {
            background: #0F1F2E;
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 40px;
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #C9A84C;
            margin-bottom: 6px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            background: #0A1628;
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 8px;
            color: white;
        }
        button {
            background: #C9A84C;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .project-card {
            background: #0F1F2E;
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 12px;
            padding: 20px;
            position: relative;
        }
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(200,50,50,0.8);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 12px;
        }
        .project-emoji {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .project-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            color: white;
        }
        .project-cat {
            font-size: 11px;
            color: #C9A84C;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .project-desc {
            font-size: 13px;
            margin-bottom: 10px;
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .tag {
            background: rgba(201,168,76,0.15);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
        }
        .success {
            background: rgba(76,175,80,0.2);
            border: 1px solid #4caf50;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #4caf50;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📁 Nexavo Portfolio Manager</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div id="message" class="success" style="display: none;"></div>

    <div class="form-card">
        <h3 style="margin-bottom: 20px;">➕ Add New Project</h3>
        <div class="form-row">
            <div class="form-group">
                <label>Project Title</label>
                <input type="text" id="title" placeholder="e.g., Amazing Website">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="category">
                    <option value="web">Web Dev</option>
                    <option value="erp">ERP</option>
                    <option value="design">Design</option>
                    <option value="ecommerce">E-Commerce</option>
                    <option value="app">Apps</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="2" placeholder="Describe the project..."></textarea>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Technologies (comma separated)</label>
                <input type="text" id="tags" placeholder="React, Node.js, MongoDB">
            </div>
            <div class="form-group">
                <label>Emoji Icon</label>
                <input type="text" id="emoji" placeholder="🚀" value="🚀">
            </div>
        </div>
        <button onclick="addProject()">➕ Add to Portfolio</button>
    </div>

    <h3>📋 Your Portfolio Projects</h3>
    <div id="projects-list" class="projects-grid"></div>
</div>

<script>
    const STORAGE_KEY = 'nexavo_portfolio_projects';

    function getProjects() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) return JSON.parse(stored);
        // Default projects
        return [
            { title: "Corporate Website — TechCorp", category: "web", desc: "Full corporate website with CMS, SEO, multi-language.", tags: ["HTML","CSS","JS","PHP"], emoji: "🌐" },
            { title: "ERPNext Full Setup — Manufacturing Co.", category: "erp", desc: "Complete ERPNext implementation with custom modules.", tags: ["ERPNext","Frappe","Python"], emoji: "⚙️" },
            { title: "Online Store — FashionHub", category: "ecommerce", desc: "Full e-commerce platform with payment integration.", tags: ["WooCommerce","WordPress","Payment API"], emoji: "🛒" },
            { title: "Inventory Manager App", category: "app", desc: "Cross-platform inventory management app.", tags: ["React","Node.js","MySQL"], emoji: "📱" }
        ];
    }

    function saveProjects(projects) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
    }

    function addProject() {
        const title = document.getElementById('title').value.trim();
        const category = document.getElementById('category').value;
        const desc = document.getElementById('description').value.trim();
        const tagsInput = document.getElementById('tags').value.trim();
        const emoji = document.getElementById('emoji').value.trim() || '🚀';

        if (!title || !desc) {
            showMessage('Please fill title and description', 'error');
            return;
        }

        const tags = tagsInput ? tagsInput.split(',').map(t => t.trim()) : [];

        const projects = getProjects();
        projects.push({ title, category, desc, tags, emoji });
        saveProjects(projects);
        
        document.getElementById('title').value = '';
        document.getElementById('description').value = '';
        document.getElementById('tags').value = '';
        
        renderProjects();
        showMessage('✅ Project added successfully!', 'success');
        
        // Sync to portfolio.html
        syncToMainPage();
    }

    function deleteProject(index) {
        const projects = getProjects();
        projects.splice(index, 1);
        saveProjects(projects);
        renderProjects();
        syncToMainPage();
        showMessage('🗑️ Project deleted', 'success');
    }

    function renderProjects() {
        const projects = getProjects();
        const container = document.getElementById('projects-list');
        
        if (projects.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#888;">No projects yet. Add your first project above!</p>';
            return;
        }
        
        container.innerHTML = projects.map((proj, idx) => `
            <div class="project-card">
                <button class="delete-btn" onclick="deleteProject(${idx})">✕</button>
                <div class="project-emoji">${proj.emoji || '📁'}</div>
                <div class="project-title">${escapeHtml(proj.title)}</div>
                <div class="project-cat">${proj.category}</div>
                <div class="project-desc">${escapeHtml(proj.desc)}</div>
                <div class="tags">
                    ${(proj.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
                </div>
            </div>
        `).join('');
    }

    function showMessage(msg, type) {
        const msgDiv = document.getElementById('message');
        msgDiv.textContent = msg;
        msgDiv.style.display = 'block';
        msgDiv.style.background = type === 'error' ? 'rgba(200,50,50,0.2)' : 'rgba(76,175,80,0.2)';
        msgDiv.style.borderColor = type === 'error' ? '#f44336' : '#4caf50';
        setTimeout(() => { msgDiv.style.display = 'none'; }, 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function syncToMainPage() {
        // This syncs data to be used by portfolio.html
        const projects = getProjects();
        localStorage.setItem('nexavo_portfolio_projects', JSON.stringify(projects));
        console.log('✅ Synced to main portfolio page');
    }

    function logout() {
        sessionStorage.removeItem('nexavo_admin');
        window.location.href = 'login.html';
    }

    // Check if logged in
    if (sessionStorage.getItem('nexavo_admin') !== 'true') {
        alert('Please login first');
        window.location.href = 'portfolio.html';
    }

    renderProjects();
</script>
</body>
</html>
