<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexavo - Home</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: #667eea;
            font-weight: bold;
        }
        .contact-form {
            max-width: 600px;
            margin: 0 auto;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .success {
            background: #4caf50;
            color: white;
            display: block;
        }
        .error {
            background: #ff4757;
            color: white;
            display: block;
        }
        .user-info {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .logout-btn {
            background: #ff4757;
            padding: 8px 16px;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <h1>✨ Nexavo</h1>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/login.html">Login</a></li>
            </ul>
        </div>
        
        <div id="userInfo" class="user-info" style="display: none;"></div>
        
        <h2>Contact Us</h2>
        
        <div class="contact-form">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <textarea id="message" rows="5" placeholder="Your Message" required></textarea>
            <button onclick="sendMessage()">Send Message</button>
            <div id="formMessage" class="message"></div>
        </div>
    </div>

    <script>
        let currentUser = null;
        
        // Check login status
        const userStr = localStorage.getItem('nexavo_user');
        if (userStr) {
            currentUser = JSON.parse(userStr);
            const userInfoDiv = document.getElementById('userInfo');
            userInfoDiv.style.display = 'block';
            userInfoDiv.innerHTML = `
                Welcome, ${currentUser.username}! ✨ 
                <a href="/login.html" class="logout-btn" onclick="logout()">Logout</a>
            `;
        }
        
        function logout() {
            localStorage.removeItem('nexavo_user');
            localStorage.removeItem('nexavo_logged_in');
            window.location.href = '/login.html';
        }
        
        async function sendMessage() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            const messageDiv = document.getElementById('formMessage');
            
            if (!name || !email || !message) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Please fill all fields';
                setTimeout(() => {
                    messageDiv.className = 'message';
                }, 3000);
                return;
            }
            
            try {
                const response = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name,
                        email,
                        message,
                        userId: currentUser?.id
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = 'Message sent successfully!';
                    document.getElementById('name').value = '';
                    document.getElementById('email').value = '';
                    document.getElementById('message').value = '';
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = 'Failed to send message';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Error sending message';
            }
            
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 3000);
        }
    </script>
</body>
</html>
